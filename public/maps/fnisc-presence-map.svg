    .region--active { fill: #dbe8f8; stroke: #296dc1; stroke-width: 1.55; vector-effect: non-scaling-stroke; }
    .leader { stroke: #9e1f2f; stroke-width: 1.4; stroke-linecap: round; opacity: .78; vector-effect: non-scaling-stroke; }
    .pin circle { fill: #9e1f2f; stroke: #ffffff; stroke-width: 2.7; vector-effect: non-scaling-stroke; }
    .pin text { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 900; text-anchor: middle; dominant-baseline: middle; }
    .label { font-family: Arial, Helvetica, sans-serif; stroke: none; }
    .label-box { fill: rgba(255,255,255,.94); stroke: #d8e0ec; stroke-width: 1; vector-effect: non-scaling-stroke; }
    .label-title { fill: #182b62; font-size: 15px; font-weight: 900; }
    .label-subtitle { fill: #344054; font-size: 11.5px; font-weight: 700; }
    .caption { fill: #667085; font-family: Arial, Helvetica, sans-serif; font-size: 12px; }

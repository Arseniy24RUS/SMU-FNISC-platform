<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 700' role='img' aria-labelledby='title desc'>
  <title id='title'>Карта присутствия ФНИСЦ РАН</title>
  <desc id='desc'>Карта субъектов Российской Федерации с отмеченными городами присутствия ФНИСЦ РАН: Москва, Санкт-Петербург, Симферополь, Нальчик и Ростов-на-Дону.</desc>
